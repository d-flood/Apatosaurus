version: '3'
services:
  ########### DJANGO
  django:
    image: damascus.flicker-lionfish.ts.net/apatosaurus:latest
    restart: always
    build:
      context: .
      dockerfile: docker_django_dev.dockerfile
    # volumes:
    #   - .:/django:rw
    ports:
      - 8002:8000
    env_file:
      - .env
    environment:
      - DEBUG=True
      - BASE_SITE_URL=http://localhost
      - USE_PRODUCTION_DB=True
      - ZAPPA_RUNNING_IN_DOCKER=True
    container_name: apatosaurus-django
    command: 
      - /bin/sh
      - -c 
      - | 
        python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db

  # The postgres image is just for development--should use a managed db service (RDS)
  db:
    image: postgres:14.0-alpine
    # volumes:
    #   - ./data/db:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    container_name: postgres_dev