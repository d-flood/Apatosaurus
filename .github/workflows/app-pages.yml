name: Deploy App to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'djazzkit'
      - 'djazzkit/packages/core/**'
      - 'djazzkit/packages/svelte/**'
      - 'collatex'
      - 'collatex/collatex-tsport/**'
      - 'triiiceratops'
      - 'triiiceratops/**'
      - 'packages/tei-transcription/**'
      - '.github/workflows/app-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: app-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DJAZZKIT_ACCESS_TOKEN }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build triiiceratops library prerequisites
        run: pnpm run build:lib
        working-directory: triiiceratops

      - name: Build app for GitHub Pages
        run: bun run build
        working-directory: app

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
