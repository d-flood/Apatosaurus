<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- PWA Meta Tags -->
		<meta name="description" content="Offline-first manuscript transcription and collation tool" />
		<meta name="theme-color" content="#782b11" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		
		<!-- iOS & Mobile Web App Meta Tags -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Apatosaurus" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192x192.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<input type="checkbox" id="activeTheme" class="hidden theme-controller" value="majuscule" checked />
		<script>
			const currentTheme =
				localStorage.getItem('theme') ||
				(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'minuscule' : 'majuscule');
			const themeController = document.getElementById('activeTheme');
			if (themeController instanceof HTMLInputElement) {
				themeController.value = currentTheme;
			}
			localStorage.setItem('theme', currentTheme);
			document.documentElement.setAttribute('data-theme', currentTheme);
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
